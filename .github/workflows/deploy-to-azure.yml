name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: tasktracker-api
  CONTAINER_APP_NAME: tasktracker-api
  CONTAINER_APP_ENV: tasktracker-env
  PORT: 5116

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Create Container Apps Environment if missing
        run: |
          az extension add --name containerapp --upgrade -y
          EXISTING=$(az containerapp env show \
            --name ${{ env.CONTAINER_APP_ENV }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            echo "Creating Container Apps environment..."
            az containerapp env create \
              --name ${{ env.CONTAINER_APP_ENV }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --location eastus2
          else
            echo "Environment already exists."
          fi

      - name: Create or Update Container App
        run: |
          EXISTING=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            echo "Creating Container App..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-server ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
              --target-port ${{ env.PORT }} \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 3 \
              --env-vars ConnectionString="${{ secrets.DATABASE_CONNECTION_STRING }}"
          else
            echo "Updating Container App image only (env vars preserved)..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          fi

      - name: Print live URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ API is live at: https://$URL"
