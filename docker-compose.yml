version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tasktracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "5116:5116"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Username=postgres;Password=password;Database=tasktracker
    depends_on:
      - db

volumes:
  postgres_data:
